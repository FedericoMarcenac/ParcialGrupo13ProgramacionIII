<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <main class="calculadoraContenedor">
        
            <h1 class="titulo">Calculadora de descuentos encadenados</h1>
            <h4 class="subtitulo">Ingrese el precio original y uno o más descuentos</h4>

            <div class="formulario">

                <div class="carta">
                    <label for="precio">Precio original</label>
                    <input type="number" id="precio" placeholder="Ingrese el precio original">
                </div>

                <!-- Contenedor dinámico de descuentos -->
                <!-- El JS agrega/quita cartas acá con agregarCampoDescuento() -->
                <div id="contenedor-descuentos">

                    <!-- Primer descuento: está hardcodeado, el JS lo toma con .input-descuento -->
                    <div class="carta">
                        <label>Descuento 1 %</label>
                        <div class="input-fila">
                            <input type="number"
                                    class="input-descuento"
                                    placeholder="Ingrese el descuento en porcentaje">
                        </div>
                        <span class="error-campo"></span>
                    </div>

                </div>

                <!-- Mensaje de error global -->
                <p id="mensaje-error"></p>

                <!-- Botones -->
                <div class="botones">
                    <button id="BTNagregar">+ Agregar descuento</button>
                    <button id="BTNcalcular">Calcular</button>
                    <button id="BTNlimpiar">Limpiar</button>
                </div>

            </div>

            <div div class="resultados">
                <p>precio final: <span id="Final"></span>$-</p>
                <p>Ahorro total: <span id="Ahorro"></span>$-</p>
            </div>
            
    </main>

</body>
</html>
